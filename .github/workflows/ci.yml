name: CI

# Runs the full test suite and the deterministic eval on every pull request and
# on pushes to main. No ANTHROPIC_API_KEY is needed: the model is mocked in tests
# and the eval exercises the rule engine only, so CI is free and deterministic.
# Make this check "Required" in the repo's branch protection so it blocks merges.

on:
  pull_request:
  push:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run test suite (unit + eval, model mocked)
        run: pytest -q

      - name: Run deterministic eval gate (must reproduce 100% of known verdicts)
        run: python -m evals.run_eval
