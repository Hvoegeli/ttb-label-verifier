<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% block title %}TTB Label Verification{% endblock %}</title>
  <link rel="stylesheet" href="/static/style.css">
</head>
<body>
  <header class="site-header">
    <div class="container">
      <span class="brand">TTB Label Verification</span>
      <span class="tag">Prototype</span>
    </div>
  </header>

  <main class="container">
    {% block content %}{% endblock %}
  </main>

  <footer class="site-footer">
    <div class="container">
      Prototype for demonstration. Not an official TTB system. Results assist a human reviewer and are not final determinations.
    </div>
  </footer>

  {% block scripts %}{% endblock %}
</body>
</html>
